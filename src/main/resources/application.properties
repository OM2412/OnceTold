# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=oncetold
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:oncetolddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── H2 Console (dev only) ─────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-development-32bytes}
app.jwt.expiry-ms=86400000

# ── Python Memory Microservice ────────────────────────────────────────────────
memory.service.base-url=http://localhost:8000
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_MODEL:llama-3.1-8b-instant}
