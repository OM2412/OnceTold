# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=oncetold
server.port=8080

# ── H2 Database (file-based in prod so data survives restarts) ────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:oncetolddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── H2 Console (dev only — disable in prod, it has no auth by default) ───────
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-development-32bytes}
app.jwt.expiry-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# ── Python Memory Microservice ────────────────────────────────────────────────
memory.service.base-url=${MEMORY_SERVICE_BASE_URL:http://localhost:8000}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_MODEL:llama-3.1-8b-instant}