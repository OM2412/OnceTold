# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=oncetold
server.port=8080
# Base64 image messages inflate ~33% over raw size; frontend caps images at
# ~1.5MB before encoding, so allow some headroom here.
server.tomcat.max-swallow-size=8MB
server.tomcat.max-http-form-post-size=8MB

# ── H2 Database (file-based in prod so data survives restarts) ────────────────
# Locally this still defaults to in-memory for fast iteration.
# On Railway, SPRING_DATASOURCE_URL is set to point at the mounted volume,
# e.g. jdbc:h2:file:/data/oncetolddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:oncetolddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Locally: create-drop (fresh schema every run). On Railway: set SPRING_JPA_DDL_AUTO=update
# so the schema is preserved and only migrated, never dropped, across restarts.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── H2 Console (dev only — disable in prod, it has no auth by default) ───────
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console


# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-development-32bytes}
app.jwt.expiry-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins. Set APP_CORS_ORIGINS on
# Railway once you know your deployed domain(s).
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# ── Python Memory Microservice ────────────────────────────────────────────────
memory.service.base-url=${MEMORY_SERVICE_BASE_URL:http://localhost:8000}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_MODEL:llama-3.1-8b-instant}
